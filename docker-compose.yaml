services:
  assetserver:
    build: .
    image: assetserver:latest
    runtime: nvidia
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      # Datasets, content-addressed assets, scenes, caches, and jobs.
      - ./data:/app/data
      # SAM3D model checkpoints (requires HuggingFace auth).
      - ./checkpoints:/app/checkpoints
      # Final expanded scene packages and ZIPs only.
      - ./outputs:/app/outputs
    ports:
      - "7010:7010"
    command:
      - asset-acquisition-server
      - --config
      - config/server.yaml
      - --host
      - 0.0.0.0
      - --port
      - "7010"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
