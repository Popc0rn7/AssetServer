name: articulated
type: articulated
role: retrieve
enabled: true
embedding_provider: openclip

sources:
  artvip:
    enabled: true
    root: data/artvip_sdf
    embeddings: data/artvip_sdf/embeddings

search:
  default_candidates: 1
  max_candidates: 20
  clip_pool_size: 5
  semantic_weight: 1.0
  bounding_box_weight: 1.0

delivery:
  format: zip
  cache_dir: .cache/assetserver/retrieve/articulated
