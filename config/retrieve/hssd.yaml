name: hssd
type: hssd_retrieval
role: retrieve
enabled: false

server:
  host: 127.0.0.1
  port: 7001

docker:
  enabled: true
  image: ${oc.env:ASSETSERVER_DOCKER_IMAGE,assetserver:latest}
  container_name: assetserver-hssd
  command:
    - python
    - -m
    - assetserver.hssd_retrieval_server.standalone_server
    - --host
    - 0.0.0.0
    - --port
    - "7001"
  ports:
    - "7001:7001"
  gpu: true
  depends_on:
    - postprocess
  volumes:
    - "${oc.env:ASSETSERVER_HOST_ROOT,.}/data:/app/data"
    - "${oc.env:ASSETSERVER_HOST_ROOT,.}/outputs:/app/outputs"

params:
  preload_retriever: true
  hssd_data_path: data/hssd-models
  hssd_preprocessed_path: data/preprocessed
  hssd_top_k: 5
  clip_device: null
