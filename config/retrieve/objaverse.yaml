name: objaverse
type: objaverse_retrieval
role: retrieve
enabled: false

profile:
  display_name: Objaverse Objects
  description: Retrieve rigid 3D objects from the configured Objaverse catalog using text search.
  best_for: [general standalone objects, long-tail object categories]
  avoid_for: [surface materials, articulated mechanisms, complete room shells]
  input_modes: [text]
  output_kind: object
  asset_kinds: [object]
  supports_reference_image: false
  supports_text: true
  supports_articulation: false
  output_traits: [dataset_geometry]
  quality: dataset-dependent
  latency: medium
  cost: low
  license: asset-defined
  tags: [retrieval, object, rigid, text-search]

server:
  host: 127.0.0.1
  port: 7007

params:
  preload_retriever: true
  objaverse_data_path: data/objathor-assets
  objaverse_preprocessed_path: data/objathor-assets/preprocessed
  objaverse_top_k: 5
  clip_device: null
