name: hunyuan3d
type: geometry_generation
role: generate
enabled: false

server:
  host: 127.0.0.1
  port: 7002

docker:
  enabled: true
  image: ${oc.env:ASSETSERVER_HUNYUAN3D_DOCKER_IMAGE,assetserver-hunyuan3d:latest}
  container_name: assetserver-hunyuan3d
  command:
    - python
    - -m
    - assetserver.geometry_generation_server.standalone_server
    - --host
    - 0.0.0.0
    - --port
    - "7002"
    - --backend
    - hunyuan3d
  ports:
    - "7002:7002"
  gpu: true
  depends_on:
    - postprocess
  environment:
    - HUNYUAN3D_MODEL_DIR=/app/checkpoints/Hunyuan3D-2
    - HUNYUAN3D_MINI_MODEL_DIR=/app/checkpoints/Hunyuan3D-2mini
    - HF_ENDPOINT=${oc.env:HF_ENDPOINT,https://huggingface.co}
  volumes:
    - "${oc.env:ASSETSERVER_HOST_ROOT,.}/checkpoints:/app/checkpoints"
    - "${oc.env:ASSETSERVER_HOST_ROOT,.}/outputs:/app/outputs"

params:
  backend: hunyuan3d
  preload_pipeline: false
  use_mini: false
