name: sam3d
type: geometry_generation
role: generate
enabled: true

profile:
  display_name: SAM3D
  description: Generate a rigid 3D object from a supplied reference image, with an optional text prompt for object-description mode.
  best_for: [single objects matching a supplied reference image]
  avoid_for: [text-only requests, articulated mechanisms, complete room shells]
  input_modes: [reference_image]
  output_kind: object
  asset_kinds: [object]
  supports_reference_image: true
  supports_text: true
  supports_articulation: false
  output_traits: [generated_geometry]
  quality: model-dependent
  latency: high
  cost: high
  license: service-defined
  tags: [generation, object, rigid, reference-image]

server:
  host: 127.0.0.1
  port: 7000

storage:
  asset_root: data/assets
  staging_root: data/jobs/staging

generation:
  pipeline: assetserver.generation_pipelines.sam3d
  preload: true
  model:
    root: checkpoints
  sources:
    sam3: thirdparty/SAM3
    sam3d_objects: thirdparty/sam-3d-objects
    dinov2: thirdparty/dinov2
  cache:
    root: data/cache/sam3d
  offline: true
  defaults:
    mode: foreground
    threshold: 0.5
