server:
  host: 127.0.0.1
  port: 7010
  storage:
    data_root: ${oc.env:ASSETSERVER_DATA_ROOT,data}
    output_root: ${oc.env:ASSETSERVER_OUTPUT_ROOT,outputs}
  scenes:
    legacy_sdf_api_enabled: false
    scene_ir_api_enabled: true
    renderer_url: ${oc.env:ASSETSERVER_RENDERER_URL,null}
  jobs:
    max_attempts: 3
  artifacts:
    # Observation content must live at least as long as workflow records.
    observation_retention_days: ${oc.env:ASSETSERVER_OBSERVATION_RETENTION_DAYS,30}
    workflow_retention_days: ${oc.env:ASSETSERVER_WORKFLOW_RETENTION_DAYS,30}

openclip: config/openclip.yaml

# Persistent runtime services are part of AssetServer itself. They are configured
# here because most pipelines depend on them and they are not treated as
# replaceable generation/retrieval sources.
runtime:
  postprocess:
    enabled: false
    policy: required
    url: http://127.0.0.1:7100
    timeout_s: 300
    concurrency: 1
    omp_threads: 4
    database: ${oc.env:ASSETSERVER_POSTPROCESS_DATABASE,data/postprocess/postprocess.sqlite3}
    staging_root: ${oc.env:ASSETSERVER_POSTPROCESS_STAGING,data/postprocess/staging}
    profile:
      name: rigid-object-v1
      method: coacd
      max_convex_hulls: 32
      threshold: 0.05
      preprocess_mode: auto
      preprocess_resolution: 50
      resolution: 2000
      mcts_nodes: 20
      mcts_iterations: 150
      mcts_max_depth: 3
      max_ch_vertex: 128
      merge: true
      decimate: false
      seed: 0

# Backend declarations are loaded from these directories. Each backend YAML owns
# its complete configuration, including whether it is enabled.
backend:
  - config/generate
  - config/retrieve
