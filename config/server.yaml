server:
  host: 127.0.0.1
  port: 7010
  storage:
    data_root: ${oc.env:ASSETSERVER_DATA_ROOT,data}
    output_root: ${oc.env:ASSETSERVER_OUTPUT_ROOT,outputs}
  scenes:
    legacy_sdf_api_enabled: false
    scene_ir_api_enabled: true
    renderer_url: ${oc.env:ASSETSERVER_RENDERER_URL,null}
  jobs:
    max_attempts: 3

openclip: config/openclip.yaml

# Persistent runtime services are part of AssetServer itself. They are configured
# here because most pipelines depend on them and they are not treated as
# replaceable generation/retrieval sources.
runtime:
  convex_decomposition:
    enabled: false
    host: 127.0.0.1
    port: 7100
    port_range: [7100, 7150]
    omp_threads: null
    server_startup_delay: 1.0
    port_cleanup_delay: 1.0
  postprocess_server:
    enabled: false
    host: 127.0.0.1
    port: 7100
    collision_method: coacd
    timeout_s: 300

# Backend declarations are loaded from these directories. Each backend YAML owns
# its complete configuration, including whether it is enabled.
backend:
  - config/generate
  - config/retrieve
